<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>のりものパレード 🚄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root {
  --sky1: #bfe8ff;
  --sky2: #eaf8ff;
  --grass1: #9ed57c;
  --grass2: #7fc35f;
  --road: #707b86;
  --road-edge: #8d98a3;
  --line: #ffe36e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: 'Kosugi Maru', sans-serif;
  background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 52%, #d9f1c8 52%, #8cca69 100%);
  position: relative;
  touch-action: manipulation;
}

/* 太陽 */
.sun {
  position: fixed;
  top: 14px; right: 18px;
  width: 70px; height: 70px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff8cf 0 28%, #ffd86c 45%, #ffbf45 72%, #f4a72a 100%);
  box-shadow: 0 0 0 8px rgba(255,210,95,.18), 0 0 30px rgba(255,192,69,.4);
  animation: sunFloat 4s ease-in-out infinite;
  z-index: 1;
}
.sun::before {
  content: "";
  position: absolute; inset: -12px;
  border-radius: 50%;
  border: 5px dashed rgba(255,217,106,.6);
  animation: spin 18s linear infinite;
}
@keyframes sunFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes spin { to{transform:rotate(360deg)} }

/* 雲 */
.cloud {
  position: fixed;
  background: #fff;
  border-radius: 999px;
  opacity: .92;
  animation: floatCloud linear infinite;
  z-index: 1;
}
.cloud::before, .cloud::after {
  content: ""; position: absolute;
  background: #fff; border-radius: 50%;
}
.c1 { width:130px;height:38px;top:8%;left:-170px;animation-duration:22s }
.c1::before { width:54px;height:54px;left:12px;top:-22px }
.c1::after  { width:64px;height:64px;left:50px;top:-30px }
.c2 { width:100px;height:30px;top:17%;left:-130px;animation-duration:28s;animation-delay:7s }
.c2::before { width:42px;height:42px;left:8px;top:-16px }
.c2::after  { width:50px;height:50px;left:38px;top:-22px }
.c3 { width:140px;height:42px;top:11%;left:-180px;animation-duration:32s;animation-delay:14s }
.c3::before { width:60px;height:60px;left:16px;top:-24px }
.c3::after  { width:70px;height:70px;left:54px;top:-32px }
@keyframes floatCloud {
  from { transform: translateX(0) }
  to   { transform: translateX(calc(100vw + 280px)) }
}

/* 丘 */
.hill {
  position: fixed;
  left: -10%; width: 120%;
  border-radius: 50%;
  z-index: 1;
}
.hill-back { bottom: 160px; height: 160px; background: linear-gradient(180deg,#d3efb1,#bce18f); }
.hill-mid  { bottom: 110px; height: 140px; background: linear-gradient(180deg,#bfe3a8,#a8d88b); }
.grass-strip {
  position: fixed; left:0; right:0; bottom:64px; height:100px;
  background: linear-gradient(180deg,var(--grass1),var(--grass2));
  z-index: 1;
}

/* 道路 */
.road {
  position: fixed; left:0; right:0; bottom:0; height:64px;
  background: linear-gradient(180deg, var(--road-edge) 0%, var(--road) 20%, #66717a 100%);
  box-shadow: inset 0 5px 0 rgba(255,255,255,.1);
  z-index: 2;
}
.road::before {
  content:""; position:absolute;
  left:0; right:0; top:50%; height:6px;
  transform: translateY(-50%);
  background: repeating-linear-gradient(90deg, var(--line) 0 38px, transparent 38px 70px);
}

/* ヘッダー */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  z-index: 20;
}
.back-btn {
  background: rgba(255,255,255,.85);
  border: none; border-radius: 50px;
  padding: 8px 18px;
  font-family: 'Kosugi Maru', sans-serif;
  font-size: 1rem; cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,0,0,.12);
  text-decoration: none; color: #333;
  -webkit-tap-highlight-color: transparent;
}
.back-btn:active { transform: scale(.95); }

.counter-wrap {
  background: rgba(255,255,255,.85);
  border-radius: 50px;
  padding: 8px 18px;
  box-shadow: 0 4px 12px rgba(0,0,0,.12);
  font-size: 1rem; font-weight: bold; color: #444;
}

/* タップ誘導 */
.tap-hint {
  position: fixed;
  bottom: 90px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,.9);
  border-radius: 50px;
  padding: 10px 24px;
  font-size: 1.1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
  z-index: 20;
  animation: hintBounce 1.2s ease-in-out infinite;
  white-space: nowrap;
}
@keyframes hintBounce {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-6px); }
}

/* 車両コンテナ */
#stage {
  position: fixed;
  left: 0; right: 0;
  bottom: 64px;
  height: 80px;
  z-index: 10;
  pointer-events: none;
}

/* 個別の車両 */
.vehicle {
  position: absolute;
  bottom: 0;
  animation: driveIn 1s cubic-bezier(.22,.68,0,1.2) forwards;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,.2));
}
@keyframes driveIn {
  from { transform: translateX(110vw); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* 名前バルーン */
.name-balloon {
  position: fixed;
  z-index: 30;
  background: white;
  border-radius: 20px;
  padding: 8px 20px;
  font-size: clamp(1.2rem, 5vw, 1.8rem);
  font-weight: bold;
  box-shadow: 0 6px 20px rgba(0,0,0,.15);
  border: 3px solid #ffe36e;
  animation: balloonPop 1.8s ease forwards;
  pointer-events: none;
  white-space: nowrap;
}
.name-balloon::after {
  content: "";
  position: absolute;
  bottom: -14px; left: 50%;
  transform: translateX(-50%);
  border: 7px solid transparent;
  border-top-color: #ffe36e;
}
@keyframes balloonPop {
  0%   { transform: scale(0) translateY(20px); opacity: 0; }
  15%  { transform: scale(1.15) translateY(-5px); opacity: 1; }
  30%  { transform: scale(1) translateY(0); opacity: 1; }
  75%  { transform: scale(1) translateY(0); opacity: 1; }
  100% { transform: scale(.8) translateY(-30px); opacity: 0; }
}

/* パレード完成オーバーレイ */
#finish {
  position: fixed; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,.35);
  z-index: 50;
  backdrop-filter: blur(3px);
}
#finish.show { display: flex; }
.finish-card {
  background: white;
  border-radius: 32px;
  padding: 36px 40px 28px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  animation: finishPop .5s cubic-bezier(.22,.68,0,1.2) forwards;
  max-width: 340px; width: 88%;
}
@keyframes finishPop {
  from { transform: scale(.5); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.finish-emoji { font-size: 3.5rem; margin-bottom: 8px; }
.finish-title {
  font-size: clamp(1.6rem, 6vw, 2.2rem);
  color: #e05; font-weight: bold;
  margin-bottom: 6px;
}
.finish-sub { font-size: 1rem; color: #666; margin-bottom: 20px; }
.finish-btn {
  display: inline-block;
  background: linear-gradient(135deg, #ff7043, #ff9800);
  color: white; border: none; border-radius: 50px;
  padding: 12px 32px; font-size: 1.1rem;
  font-family: 'Kosugi Maru', sans-serif;
  cursor: pointer;
  box-shadow: 0 6px 0 #c85a00;
  -webkit-tap-highlight-color: transparent;
  margin: 6px;
}
.finish-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #c85a00; }
.finish-btn.home {
  background: linear-gradient(135deg, #42a5f5, #1976d2);
  box-shadow: 0 6px 0 #1256a0;
}
.finish-btn.home:active { box-shadow: 0 3px 0 #1256a0; }

/* 紙吹雪 */
.confetti {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 2px;
  z-index: 49;
  animation: confettiFall linear forwards;
  pointer-events: none;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* タップエフェクト */
.tap-ripple {
  position: fixed;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,.5);
  transform: translate(-50%, -50%) scale(0);
  animation: ripple .5s ease-out forwards;
  pointer-events: none;
  z-index: 40;
}
@keyframes ripple {
  to { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}
</style>
</head>

// =====================
// ゲーム状態
// =====================
let current = 0;
let positions = []; // 各車のx位置

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const tapHint = document.getElementById('tapHint');
const finish = document.getElementById('finish');

// =====================
// Web Audio
// =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getCtx() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

// 各乗り物の音
function playSound(id) {
  const ac = getCtx();
  const t = ac.currentTime;
  const sounds = {
    shinkansen() {
      // 新幹線ホイッスル
      [0, 0.55].forEach((d, i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(i===0?880:1100, t+d);
        o.frequency.linearRampToValueAtTime(i===0?1100:880, t+d+0.3);
        g.gain.setValueAtTime(0.4, t+d);
        g.gain.exponentialRampToValueAtTime(0.001, t+d+0.45);
        o.connect(g); g.connect(ac.destination);
        o.start(t+d); o.stop(t+d+0.5);
      });
    },
    steam() {
      // 蒸気機関車 シュッシュッ
      [0, 0.22, 0.44, 0.66].forEach(d => {
        const o = ac.createOscillator(), g = ac.createGain();
        const buf = ac.createBuffer(1, ac.sampleRate*0.12, ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*(1-i/data.length);
        const src = ac.createBufferSource();
        const bpf = ac.createBiquadFilter();
        const gn = ac.createGain();
        bpf.type='bandpass'; bpf.frequency.value=300; bpf.Q.value=1;
        gn.gain.setValueAtTime(0.5,t+d);
        gn.gain.exponentialRampToValueAtTime(0.001,t+d+0.18);
        src.buffer=buf; src.connect(bpf); bpf.connect(gn); gn.connect(ac.destination);
        src.start(t+d);
        // 汽笛
        if(d===0){
          const wo=ac.createOscillator(), wg=ac.createGain();
          wo.type='sawtooth'; wo.frequency.value=220;
          wg.gain.setValueAtTime(0.25,t+0.7); wg.gain.exponentialRampToValueAtTime(0.001,t+1.1);
          wo.connect(wg); wg.connect(ac.destination); wo.start(t+0.7); wo.stop(t+1.1);
        }
      });
    },
    fire() {
      // 消防車サイレン
      const o = ac.createOscillator(), g = ac.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(770,t); o.frequency.linearRampToValueAtTime(640,t+0.25);
      o.frequency.linearRampToValueAtTime(770,t+0.5); o.frequency.linearRampToValueAtTime(640,t+0.75);
      o.frequency.linearRampToValueAtTime(770,t+1.0);
      g.gain.setValueAtTime(0.4,t); g.gain.setValueAtTime(0.4,t+0.9); g.gain.exponentialRampToValueAtTime(0.001,t+1.1);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+1.1);
    },
    amb() {
      // 救急車 ピーポー
      const o = ac.createOscillator(), g = ac.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(640,t); o.frequency.linearRampToValueAtTime(770,t+0.25);
      o.frequency.linearRampToValueAtTime(640,t+0.5); o.frequency.linearRampToValueAtTime(770,t+0.75);
      o.frequency.linearRampToValueAtTime(640,t+1.0);
      g.gain.setValueAtTime(0.38,t); g.gain.setValueAtTime(0.38,t+0.95); g.gain.exponentialRampToValueAtTime(0.001,t+1.1);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+1.1);
    },
    police() {
      // パトカー ウ〜
      const o = ac.createOscillator(), g = ac.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(440,t); o.frequency.linearRampToValueAtTime(550,t+0.4);
      o.frequency.linearRampToValueAtTime(440,t+0.8);
      g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+1.0);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+1.0);
    },
    bus() {
      // バス プップー
      [0, 0.35].forEach(d => {
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='square'; o.frequency.value=220;
        g.gain.setValueAtTime(0.25,t+d); g.gain.exponentialRampToValueAtTime(0.001,t+d+0.28);
        o.connect(g); g.connect(ac.destination); o.start(t+d); o.stop(t+d+0.3);
      });
    },
    garbage() {
      // ゴミ収集車 バックオーライ的な音
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='square'; o.frequency.value=440;
      g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.2);
      setTimeout(()=>{
        const o2=ac.createOscillator(), g2=ac.createGain();
        o2.type='square'; o2.frequency.value=440;
        g2.gain.setValueAtTime(0.2,actx.currentTime); g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);
        o2.connect(g2); g2.connect(ac.destination); o2.start(actx.currentTime); o2.stop(actx.currentTime+0.2);
      }, 250);
    },
    shovel() {
      // ショベルカー エンジン音
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sawtooth'; o.frequency.value=60;
      o.frequency.linearRampToValueAtTime(90,t+0.3);
      g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.7);
    },
    delica() {
      // デリカ 軽快なクラクション
      [0, 0.18].forEach((d,i)=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='triangle'; o.frequency.value=i===0?440:550;
        g.gain.setValueAtTime(0.3,t+d); g.gain.exponentialRampToValueAtTime(0.001,t+d+0.22);
        o.connect(g); g.connect(ac.destination); o.start(t+d); o.stop(t+d+0.25);
      });
    }
  };
  if (sounds[id]) try { sounds[id](); } catch(e){}
}

// パレード完成音
function playFinishSound() {
  const ac = getCtx();
  const t = ac.currentTime;
  const melody = [523,659,784,880,1047,880,784,659,523];
  melody.forEach((freq, i) => {
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.35, t+i*0.12);
    g.gain.exponentialRampToValueAtTime(0.001, t+i*0.12+0.25);
    o.connect(g); g.connect(ac.destination);
    o.start(t+i*0.12); o.stop(t+i*0.12+0.3);
  });
}

// =====================
// 車両配置計算
// =====================
function calcPositions() {
  const W = window.innerWidth;
  const count = VEHICLES.length; // 9台
  const totalWidth = VEHICLES.reduce((s, v) => s + v.width + 12, 0);
  let x = Math.max(8, (W - totalWidth) / 2);
  return VEHICLES.map(v => {
    const pos = x;
    x += v.width + 12;
    return pos;
  });
}

// =====================
// タップ処理
// =====================
function onTap(e) {
  if (current >= VEHICLES.length) return;

  // タップリップル
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  ripple.style.left = cx + 'px';
  ripple.style.top  = cy + 'px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);

  const v = VEHICLES[current];
  if (!positions.length) positions = calcPositions();

  // 車両DOM生成
  const el = document.createElement('div');
  el.className = 'vehicle';
  el.style.left = positions[current] + 'px';
  el.innerHTML = v.svg;
  el.style.animationDuration = current < 2 ? '0.8s' : '0.6s'; // 電車は少しゆっくり
  stage.appendChild(el);

  // 名前バルーン
  const balloon = document.createElement('div');
  balloon.className = 'name-balloon';
  balloon.textContent = v.name;
  balloon.style.borderColor = v.color;
  balloon.style.left = (positions[current] + v.width/2) + 'px';
  balloon.style.transform = 'translateX(-50%)';
  balloon.style.bottom = '160px';
  document.body.appendChild(balloon);
  setTimeout(() => balloon.remove(), 1900);

  // 音
  playSound(v.id);

  current++;
  counter.textContent = `${current} / 9 🚗`;

  if (current === 1) {
    tapHint.style.opacity = '0';
    tapHint.style.transition = 'opacity .4s';
    setTimeout(() => tapHint.remove(), 500);
  }

  if (current >= VEHICLES.length) {
    setTimeout(() => {
      playFinishSound();
      launchConfetti();
      finish.classList.add('show');
    }, 1000);
  }
}

// =====================
// 紙吹雪
// =====================
function launchConfetti() {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random()*100 + 'vw';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.width = (8+Math.random()*8)+'px';
      el.style.height = (8+Math.random()*8)+'px';
      el.style.borderRadius = Math.random()>.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5+Math.random()*2)+'s';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 40);
  }
}

// =====================
// リセット
// =====================
function resetGame() {
  current = 0;
  positions = [];
  stage.innerHTML = '';
  finish.classList.remove('show');
  counter.textContent = '0 / 9 🚗';
  const hint = document.createElement('div');
  hint.id = 'tapHint';
  hint.className = 'tap-hint';
  hint.textContent = '👆 どこでもタップして！';
  document.body.appendChild(hint);
}

// イベント登録
document.addEventListener('touchstart', onTap, { passive: true });
document.addEventListener('click', onTap);
</script>
