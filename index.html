<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>のりものワールド 🚂</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
  :root{
    --sky1:#bfe8ff;
    --sky2:#eaf8ff;
    --hill1:#bfe3a8;
    --hill2:#a8d88b;
    --grass1:#9ed57c;
    --grass2:#7fc35f;
    --road:#707b86;
    --road-edge:#8d98a3;
    --line:#ffe36e;
    --card-shadow: 0 8px 0 rgba(0,0,0,.12), 0 18px 28px rgba(0,0,0,.12);
    --stroke:#28424f;
    --white:#fff;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    width:100%;
    min-height:100%;
    overflow-x:hidden;
  }

  body{
    font-family:'Kosugi Maru', sans-serif;
    background:
      linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 48%, #d9f1c8 48%, #bbdf93 70%, #8cca69 100%);
    color:#24333d;
    position:relative;
  }

  .bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }

  .sun{
    position:absolute;
    top:18px;
    right:20px;
    width:86px;
    height:86px;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 35%, #fff8cf 0 28%, #ffd86c 45%, #ffbf45 72%, #f4a72a 100%);
    box-shadow:
      0 0 0 10px rgba(255,210,95,.18),
      0 0 40px rgba(255,192,69,.45);
    animation:sunFloat 4s ease-in-out infinite;
  }

  .sun::before{
    content:"";
    position:absolute;
    inset:-14px;
    border-radius:50%;
    border:6px dashed rgba(255,217,106,.65);
    animation:spin 18s linear infinite;
  }

  @keyframes sunFloat{
    0%,100%{transform:translateY(0) scale(1)}
    50%{transform:translateY(-4px) scale(1.03)}
  }
  @keyframes spin{
    from{transform:rotate(0)}
    to{transform:rotate(360deg)}
  }

  .cloud{
    position:absolute;
    background:#fff;
    border-radius:999px;
    opacity:.95;
    box-shadow:0 8px 16px rgba(0,0,0,.06);
    animation:floatCloud linear infinite;
  }
  .cloud::before,.cloud::after{
    content:"";
    position:absolute;
    background:#fff;
    border-radius:50%;
  }
  .cloud-1{width:140px;height:42px;top:7%;left:-180px;animation-duration:24s}
  .cloud-1::before{width:58px;height:58px;left:14px;top:-24px}
  .cloud-1::after{width:70px;height:70px;left:54px;top:-34px}

  .cloud-2{width:110px;height:34px;top:18%;left:-140px;animation-duration:30s;animation-delay:6s}
  .cloud-2::before{width:46px;height:46px;left:10px;top:-18px}
  .cloud-2::after{width:54px;height:54px;left:42px;top:-24px}

  .cloud-3{width:150px;height:45px;top:12%;left:-200px;animation-duration:34s;animation-delay:12s}
  .cloud-3::before{width:66px;height:66px;left:18px;top:-26px}
  .cloud-3::after{width:76px;height:76px;left:56px;top:-34px}

  @keyframes floatCloud{
    from{transform:translateX(0)}
    to{transform:translateX(calc(100vw + 260px))}
  }

  .hill{
    position:absolute;
    left:-10%;
    width:120%;
    border-radius:50%;
  }

  .hill.back{
    bottom:145px;
    height:170px;
    background:linear-gradient(180deg, #d3efb1 0%, #bce18f 100%);
    box-shadow:inset 0 10px 20px rgba(255,255,255,.25);
  }

  .hill.mid{
    bottom:98px;
    height:150px;
    background:linear-gradient(180deg, var(--hill1) 0%, var(--hill2) 100%);
  }

  .grass{
    position:absolute;
    left:0;
    right:0;
    bottom:56px;
    height:110px;
    background:linear-gradient(180deg, var(--grass1) 0%, var(--grass2) 100%);
    box-shadow:inset 0 10px 20px rgba(255,255,255,.16);
  }

  .app{
    position:relative;
    z-index:10;
    padding:18px 14px 140px;
    max-width:760px;
    margin:0 auto;
  }

  .title-wrap{
    position:relative;
    text-align:center;
    margin:6px auto 16px;
  }

  .title-main{
    font-size:clamp(2rem, 7vw, 3.5rem);
    line-height:1.1;
    color:#ffffff;
    text-shadow:
      0 3px 0 #5fadc9,
      0 6px 0 rgba(0,0,0,.08);
    letter-spacing:.04em;
    animation:titleBounce 2.4s ease-in-out infinite;
  }

  .title-sub{
    margin-top:10px;
    font-size:clamp(.95rem, 3.8vw, 1.3rem);
    color:#fffef4;
    text-shadow:0 2px 0 rgba(145,115,34,.45);
  }

  @keyframes titleBounce{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-5px)}
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
    max-width:560px;
    margin:0 auto;
  }

  .grid .card:nth-child(5){
    grid-column:1 / -1;
    max-width:260px;
    width:100%;
    margin:0 auto;
  }

  .card{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:160px;
    text-align:center;
    text-decoration:none;
    padding:16px 12px 14px;
    border-radius:28px;
    color:#27343d;
    box-shadow:var(--card-shadow);
    border:4px solid rgba(255,255,255,.85);
    overflow:hidden;
    transform:translateY(0);
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
    -webkit-tap-highlight-color:transparent;
    cursor:pointer;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 25% 20%, rgba(255,255,255,.85) 0%, rgba(255,255,255,0) 34%),
      linear-gradient(180deg, rgba(255,255,255,.20) 0%, rgba(255,255,255,0) 55%);
    pointer-events:none;
  }

  .card::after{
    content:"";
    position:absolute;
    inset:auto 10px 10px 10px;
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.35);
    filter:blur(2px);
    opacity:.75;
  }

  .card:active{
    transform:translateY(4px) scale(.98);
    box-shadow:0 3px 0 rgba(0,0,0,.12), 0 8px 16px rgba(0,0,0,.12);
  }

  /* タップ時の光るエフェクト */
  .card.playing {
    animation: cardPulse 0.4s ease-out;
  }
  @keyframes cardPulse {
    0%   { filter: brightness(1); }
    40%  { filter: brightness(1.25); }
    100% { filter: brightness(1); }
  }

  .card-1{background:linear-gradient(180deg,#fffaf2 0%, #ffe8c9 100%)}
  .card-2{background:linear-gradient(180deg,#f4fbff 0%, #dcefff 100%)}
  .card-3{background:linear-gradient(180deg,#fff5f5 0%, #ffdede 100%)}
  .card-4{background:linear-gradient(180deg,#f4fff8 0%, #d9f4e4 100%)}
  .card-5{background:linear-gradient(180deg,#faf5ff 0%, #eadbff 100%)}

  .emoji-wrap{
    width:78px;
    height:78px;
    display:grid;
    place-items:center;
    border-radius:50%;
    background:rgba(255,255,255,.72);
    box-shadow:
      inset 0 4px 8px rgba(255,255,255,.65),
      0 6px 12px rgba(0,0,0,.08);
  }

  .card-emoji{
    font-size:clamp(2.6rem, 9vw, 3.4rem);
    line-height:1;
    filter:drop-shadow(0 3px 0 rgba(0,0,0,.12));
    animation:wobble 2.8s ease-in-out infinite;
  }
  .card:nth-child(2) .card-emoji{animation-delay:.3s}
  .card:nth-child(3) .card-emoji{animation-delay:.6s}
  .card:nth-child(4) .card-emoji{animation-delay:.9s}
  .card:nth-child(5) .card-emoji{animation-delay:1.2s}

  @keyframes wobble{
    0%,100%{transform:rotate(-4deg) translateY(0)}
    50%{transform:rotate(4deg) translateY(-4px)}
  }

  .card-title{
    font-size:clamp(.94rem, 3.2vw, 1.1rem);
    line-height:1.28;
    font-weight:700;
  }

  .card-badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    color:#fff;
    font-size:.72rem;
    font-weight:700;
    box-shadow:0 3px 0 rgba(0,0,0,.10);
  }
  .card-1 .card-badge{background:#f0a04e}
  .card-2 .card-badge{background:#5aa7ea}
  .card-3 .card-badge{background:#ef7373}
  .card-4 .card-badge{background:#67b888}
  .card-5 .card-badge{background:#9e7ae2}

  /* 街 */
  .city{
    position:fixed;
    left:0;
    right:0;
    bottom:98px;
    height:130px;
    z-index:3;
    pointer-events:none;
  }

  /* 線路 */
  .rail-track{
    position:fixed;
    left:0;
    right:0;
    bottom:230px;
    height:18px;
    z-index:4;
    pointer-events:none;
  }

  .train{
    position:fixed;
    bottom:240px;
    left:110%;
    z-index:5;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.18));
    animation:trainRide linear infinite;
  }
  .train-shinkansen{animation-duration:7s; animation-delay:0s;}
  .train-steam{animation-duration:15s; animation-delay:6s;}

  @keyframes trainRide{
    from{transform:translateX(0)}
    to{transform:translateX(calc(-100vw - 420px))}
  }

  /* 道路 */
  .road{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    height:62px;
    z-index:6;
    background:
      linear-gradient(180deg, var(--road-edge) 0%, var(--road) 20%, #66717a 100%);
    box-shadow:inset 0 5px 0 rgba(255,255,255,.12);
  }

  .road::before{
    content:"";
    position:absolute;
    left:0;
    right:0;
    top:50%;
    height:6px;
    transform:translateY(-50%);
    background:
      repeating-linear-gradient(90deg, var(--line) 0 38px, transparent 38px 70px);
  }

  .road::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    top:0;
    height:6px;
    background:rgba(255,255,255,.09);
  }

  .runner{
    position:fixed;
    left:110%;
    bottom:58px;
    z-index:7;
    filter:drop-shadow(0 5px 8px rgba(0,0,0,.18));
    animation:drive linear infinite;
  }

  .runner-fire{animation-duration:8s;animation-delay:0s}
  .runner-amb{animation-duration:9s;animation-delay:3s}
  .runner-bus{animation-duration:11s;animation-delay:6s}
  .runner-police{animation-duration:8.5s;animation-delay:10s}
  .runner-garbage{animation-duration:12s;animation-delay:13s}
  .runner-delica{animation-duration:10s;animation-delay:17s}

  @keyframes drive{
    from{transform:translateX(0)}
    to{transform:translateX(calc(-100vw - 240px))}
  }

  .vehicle svg,
  .train svg{
    overflow:visible;
  }

  .stroke{
    stroke:var(--stroke);
    stroke-width:2.5;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  @media (max-width:480px){
    .app{padding-left:12px;padding-right:12px}
    .grid{gap:12px}
    .card{min-height:152px;border-radius:24px}
    .emoji-wrap{width:72px;height:72px}
    .city{height:116px}
    .rail-track{bottom:200px}
    .train{bottom:210px}
  }
</style>
</head>

<script>
// =============================================
// Web Audio API による乗り物サウンドエンジン
// =============================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;

function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

const sounds = {

  // 🚄 新幹線：高音の発車ホイッスル → 加速音
  shinkansen(ac) {
    const t = ac.currentTime;
    // ホイッスル
    const osc1 = ac.createOscillator();
    const gain1 = ac.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(880, t);
    osc1.frequency.linearRampToValueAtTime(1100, t + 0.15);
    osc1.frequency.linearRampToValueAtTime(880, t + 0.3);
    gain1.gain.setValueAtTime(0.4, t);
    gain1.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc1.connect(gain1); gain1.connect(ac.destination);
    osc1.start(t); osc1.stop(t + 0.5);
    // 2回目
    const osc2 = ac.createOscillator();
    const gain2 = ac.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1100, t + 0.55);
    gain2.gain.setValueAtTime(0.35, t + 0.55);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    osc2.connect(gain2); gain2.connect(ac.destination);
    osc2.start(t + 0.55); osc2.stop(t + 0.9);
  },

  // 🚌 バス：プップー（低めのクラクション2回）
  match(ac) {
    const t = ac.currentTime;
    [0, 0.35].forEach((delay, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(220, t + delay);
      osc.frequency.linearRampToValueAtTime(200, t + delay + 0.2);
      gain.gain.setValueAtTime(0.25, t + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.28);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(t + delay); osc.stop(t + delay + 0.3);
    });
  },

  // 🏗️ 工場：ガガガッ（工事音・ノイズ系）
  build(ac) {
    const t = ac.currentTime;
    // 低いドリル音
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.setValueAtTime(120, t + 0.08);
    osc.frequency.setValueAtTime(80, t + 0.16);
    osc.frequency.setValueAtTime(120, t + 0.24);
    osc.frequency.setValueAtTime(80, t + 0.32);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.5);
    // メタル打撃音
    const buf = ac.createBuffer(1, ac.sampleRate * 0.15, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = ac.createBufferSource();
    const bpf = ac.createBiquadFilter();
    const gn = ac.createGain();
    bpf.type = 'bandpass'; bpf.frequency.value = 1200; bpf.Q.value = 0.5;
    gn.gain.setValueAtTime(0.6, t + 0.45);
    gn.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    src.buffer = buf;
    src.connect(bpf); bpf.connect(gn); gn.connect(ac.destination);
    src.start(t + 0.45);
  },

  // 🔊 音あてゲーム：ポロロン（クイズ正解っぽい音）
  quiz(ac) {
    const t = ac.currentTime;
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.35, t + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.25);
      osc.connect(gain); gain.connect(ac.destination);
      osc.start(t + i * 0.1);
      osc.stop(t + i * 0.1 + 0.3);
    });
  },

  // 🏙️ まちをはしろう：ピーポーピーポー（サイレン風）
  city(ac) {
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'sine';
    // ピーポー繰り返し
    osc.frequency.setValueAtTime(770, t);
    osc.frequency.linearRampToValueAtTime(640, t + 0.25);
    osc.frequency.linearRampToValueAtTime(770, t + 0.5);
    osc.frequency.linearRampToValueAtTime(640, t + 0.75);
    osc.frequency.linearRampToValueAtTime(770, t + 1.0);
    gain.gain.setValueAtTime(0.35, t);
    gain.gain.setValueAtTime(0.35, t + 0.9);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.1);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 1.1);
  }
};

// カードにイベント登録
document.querySelectorAll('.card[data-sound]').forEach(card => {
  card.addEventListener('click', function(e) {
    e.preventDefault(); // 音を鳴らしてからページ遷移
    const soundKey = this.dataset.sound;
    const href = this.getAttribute('href');

    // 光るエフェクト
    this.classList.add('playing');
    this.addEventListener('animationend', () => this.classList.remove('playing'), { once: true });

    try {
      const ac = getCtx();
      if (sounds[soundKey]) sounds[soundKey](ac);
    } catch(err) { console.warn('Audio error:', err); }

    // 音が鳴り終わったあとに遷移（最大600ms待つ）
    setTimeout(() => { window.location.href = href; }, 600);
  });
});
</script>
